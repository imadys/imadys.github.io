<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
    integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

  <link rel="stylesheet" href="assests/main.css">
  <title>Cat</title>

<body>
  <div id="home-section">
    <div class="container">
      <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="#"><img src="assests/imgs/brand.png" class="img-fluid" width="80%" alt=""></a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavAltMarkup"
          aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
          <div class="navbar-nav ml-auto">
            <a class="nav-item nav-link" href="#home-section">Home <span class="sr-only">(current)</span></a>
            <a class="nav-item nav-link" href="#about-section">About</a>
            <a class="nav-item nav-link" href="#gallary-section">Gallary</a>
          </div>
        </div>
      </nav>
      <h1 class="intro text-center">A cats gallary</h1>
      <div class="scroller text-center">
        <img src="assests/imgs/scroller.svg" class="img-fluid" width="20px" alt="">
      </div>
    </div>
  </div>
  <!-- About section  -->
  <div id="about-section">
    <div class="container">
      <div class="col-md-12 text-center">
        <div class="about">
          <h1>About</h1>
          <p>this site is reshare the cats photo from internet or we take our shots by our self</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Gallary -->
  <div id="gallary-section">
    <h1 class="text-center">Gallary</h1>
    <div class="container">
      <div id="carouselExampleControls" class="carousel slide" data-ride="carousel">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img class="d-block w-100" src="assests/imgs/gallary1.jpg" alt="First slide">
          </div>
          <div class="carousel-item">
            <img class="d-block w-100" src="assests/imgs/gallary2.jpg" alt="Second slide">
          </div>
          <div class="carousel-item">
            <img class="d-block w-100" src="assests/imgs/gallary3.jpg" alt="Third slide">
          </div>
        </div>
        <a class="carousel-control-prev" href="#carouselExampleControls" role="button" data-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="sr-only">Previous</span>
        </a>
        <a class="carousel-control-next" href="#carouselExampleControls" role="button" data-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="sr-only">Next</span>
        </a>
      </div>
    </div>
  </div>
  <!-- NONE -->
  <div id="none" class="text-center">
    <h2 class="">these cute cats from </h2>
    <a class="source btn btn-primary" href="https://wallpaperscraft.com">WallpapersCraft</a>
  </div>
  <!-- FOOTER -->
  <div id="footer">
    <div class="container text-center">
      <p>&copy; LaleHQ 2019</p>
    </div>
  </div>
  <!-- Optional JavaScript -->
  <!-- jQuery first, then Popper.js, then Bootstrap JS -->

    crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
    integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
    crossorigin="anonymous"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
    integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
    crossorigin="anonymous"></script>
